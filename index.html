];
async function fetchStooq(symbol) {
  const src = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlcv&h&e=csv`;
  for (const p of PROXIES) {
    try {
      const res = await fetch(p(src));
      if (!res.ok) continue;
      const text = await res.text();
      const lines = text.trim().split("\n");
      if (lines.length < 2) continue;
      const close = parseFloat(lines[1].split(",")[6]);
      if (!isNaN(close) && close > 0) return close;
    } catch (e) { /* try next proxy */ }
  }
  return null;
}

/* ------------------------------- helpers --------------------------------- */
function won(n) {
  if (n === null || n === undefined || n === "" || isNaN(n)) return "—";
  let v = Math.round(Number(n));
  const neg = v < 0; v = Math.abs(v);
  const eok = Math.floor(v / 1e8), man = Math.floor((v % 1e8) / 1e4), rest = v % 1e4;
  const p = [];
  if (eok > 0) p.push(eok.toLocaleString() + "억");
  if (man > 0) p.push(man.toLocaleString() + "만");
  if (eok === 0 && man === 0) p.push(rest.toLocaleString());
  return (neg ? "-" : "") + p.join(" ") + "원";
}
const signWon = (n) => (Number(n) > 0 ? "+" : "") + won(n);

/* ------------------------------ position math ----------------------------- */
// 이동평균법 — 거래내역에서 종목별 보유수량·평균단가·실현손익·배당 계산
function computePositions(txns, pricesByName, fx) {
  const sorted = [...txns].sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
  const g = {};
  for (const t of sorted) {
    const key = t.accountId + "||" + t.name;
    if (!g[key]) g[key] = { accountId: t.accountId, name: t.name, currency: t.currency || "KRW", shares: 0, avgCost: 0, realized: 0, dividends: 0, invested: 0 };
    const p = g[key]; p.currency = t.currency || p.currency;
    const qty = num(t.shares), price = num(t.price), fee = num(t.fee);
    if (t.type === "buy") {
      const add = qty * price + fee;
      p.avgCost = (p.avgCost * p.shares + add) / ((p.shares + qty) || 1);
      p.shares += qty; p.invested += add;
    } else if (t.type === "sell") {
      const proceeds = qty * price - fee;
      p.realized += proceeds - p.avgCost * qty;
      p.shares = Math.max(0, p.shares - qty);
    } else if (t.type === "dividend") {
      p.dividends += price - fee;
    }
  }
  return Object.values(g).map((p) => {
    const cp = num(pricesByName[p.name]);
    const mv = p.shares * cp;
    const unreal = (cp - p.avgCost) * p.shares;
    const conv = p.currency === "USD" ? fx : 1;
    return { ...p, currentPrice: cp, marketValue: mv, unrealized: unreal,
      mvKRW: mv * conv, unrealizedKRW: unreal * conv, realizedKRW: p.realized * conv,
      dividendsKRW: p.dividends * conv, investedKRW: p.invested * conv, conv };
  });
}

// XIRR (금액가중수익률) — 현금흐름 + 현재 평가액으로 연환산 수익률 계산
function xirr(flows) {
  const cf = [...flows].filter((f) => f.amount).sort((a, b) => a.date - b.date);
  if (cf.length < 2) return null;
  const t0 = cf[0].date.getTime();
  const yrs = (d) => (d.getTime() - t0) / (365 * 24 * 3600 * 1000);
  const npv = (r) => cf.reduce((s, f) => s + f.amount / Math.pow(1 + r, yrs(f.date)), 0);
  let lo = -0.9999, hi = 10, fLo = npv(lo), fHi = npv(hi);
  if (isNaN(fLo) || isNaN(fHi) || fLo * fHi > 0) return null;
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2, f = npv(mid);
    if (Math.abs(f) < 1) return mid;
    if (fLo * f < 0) { hi = mid; fHi = f; } else { lo = mid; fLo = f; }
  }
  return (lo + hi) / 2;
}

function normalize(d) {
  const out = { ...SEED, ...d };
  out.profile = { ...SEED.profile, ...(d.profile || {}) };
  out.assets = d.assets || SEED.assets;
  out.debts = d.debts || SEED.debts;
  out.yearly = (d.yearly || SEED.yearly).map((y) => ({ returnAmt: null, ...y }));
  out.quarterly = d.quarterly || SEED.quarterly;
  out.snapshots = d.snapshots || SEED.snapshots;
  out.invSeries = d.invSeries || SEED.invSeries;
  // migrate old holdings-based accounts -> transactions
  if (d.accounts && d.accounts[0] && d.accounts[0].holdings) {
    const accts = [], txns = [], prices = {};
    d.accounts.forEach((a) => {
      accts.push({ id: a.id, name: a.name, broker: a.broker || "" });
      (a.holdings || []).forEach((h) => {
        txns.push({ id: uid(), date: "2024-01-01", accountId: a.id, name: h.name, type: "buy", shares: num(h.shares), price: num(h.avgCost), fee: 0, currency: h.currency || "KRW" });
        prices[h.name] = num(h.currentPrice);
      });
    });
    out.accounts = accts; out.transactions = txns; out.prices = prices;
  } else {
    out.accounts = d.accounts || SEED.accounts;
    out.transactions = d.transactions || SEED.transactions;
    out.prices = d.prices || SEED.prices;
  }
  delete out.investments;
  out.transactions = (out.transactions || []).map((t) => ({ ...t, opening: t.opening !== undefined ? t.opening : (t.date === OPEN) }));
  return out;
}

function NumInput({ value, onChange, hint, width = 130, align = "right", step }) {
  return (
    <span className="lr-numwrap" style={{ width }}>
      <input className="lr-input" type="number" step={step} value={value ?? ""} style={{ textAlign: align }}

}

function LifeRoad() {
  const [data, setData] = useState(() => normalize(SEED));
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [retView, setRetView] = useState("year");
  const [refreshing, setRefreshing] = useState(false);
  const [refreshMsg, setRefreshMsg] = useState("");
  const [snapMsg, setSnapMsg] = useState("");
  const [backupMsg, setBackupMsg] = useState("");
  const backupTimer = useRef(null);

  useEffect(() => {
    (async () => {
      if (window.storage) {
        for (const k of ["liferoad_v10"]) {
          try { const r = await window.storage.get(k); if (r && r.value) { setData(normalize(JSON.parse(r.value))); break; } } catch (e) {}
        }
      }
      setLoaded(true);
    })();
  }, []);
  useEffect(() => {
    if (!loaded) return;
    (async () => { try { if (window.storage) await window.storage.set("liferoad_v10", JSON.stringify(data)); } catch (e) {} })();
  }, [data, loaded]);

  // 웹 자동 백업: 데이터가 바뀌면 4초 후 시세 서버(/backup)로 전송 → GitHub 저장
  useEffect(() => {
    if (!loaded) return;
    const server = (data.profile.priceServer || "").trim().replace(/\/+$/, "");
    const key = (data.profile.backupKey || "").trim();
    if (!server || !key) return;
    clearTimeout(backupTimer.current);
    backupTimer.current = setTimeout(async () => {
      try {
        const res = await fetch(`${server}/backup?key=${encodeURIComponent(key)}`, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data),
        });
        setBackupMsg(res.ok ? "자동 백업됨 " + new Date().toLocaleTimeString("ko-KR") : "백업 실패 (" + res.status + ")");
      } catch (e) { setBackupMsg("백업 실패 — 네트워크"); }
    }, 4000);
    return () => clearTimeout(backupTimer.current);
  }, [data, loaded]);

  const set = (patch) => setData((d) => ({ ...d, ...patch }));
  const fx = num(data.profile.fx) || 1;
  const curYear = new Date().getFullYear();
  const age = curYear - num(data.profile.birthYear);
  const accName = (id) => { const a = data.accounts.find((x) => x.id === id); return a ? a.name : "—"; };

  /* ---- positions from ledger ---- */
  const positions = useMemo(() => computePositions(data.transactions, data.prices, fx), [data.transactions, data.prices, fx]);
  const investCurrent = positions.reduce((s, p) => s + p.mvKRW, 0);
  const unrealTotal = positions.reduce((s, p) => s + p.unrealizedKRW, 0);
  const realizedLedger = positions.reduce((s, p) => s + p.realizedKRW, 0);
  const openingRealized = num(data.profile.openingRealized);
  const realizedTotal = realizedLedger + openingRealized;
  const dividendTotal = positions.reduce((s, p) => s + p.dividendsKRW, 0);
  const investedTotal = positions.reduce((s, p) => s + p.investedKRW, 0);
  const costBasis = positions.reduce((s, p) => s + p.avgCost * p.shares * p.conv, 0);
  const unrealReturn = costBasis ? (unrealTotal / costBasis) * 100 : 0;
  const cumPL = unrealTotal + realizedTotal + dividendTotal;
  const cumReturn = investedTotal ? (cumPL / investedTotal) * 100 : 0;

  const xirrRate = useMemo(() => {
    const flows = [];
    data.transactions.forEach((t) => {
      const conv = (t.currency === "USD" ? fx : 1);
      const d = new Date(t.date); if (isNaN(d)) return;
      const qty = num(t.shares), price = num(t.price), fee = num(t.fee);
      if (t.type === "buy") flows.push({ date: d, amount: -(qty * price + fee) * conv });
      else if (t.type === "sell") flows.push({ date: d, amount: (qty * price - fee) * conv });
      else if (t.type === "dividend") flows.push({ date: d, amount: (price - fee) * conv });
    });
    if (investCurrent > 0) flows.push({ date: new Date(), amount: investCurrent });
    const r = xirr(flows);
    return r == null ? null : r * 100;
  }, [data.transactions, fx, investCurrent]);

  const otherAssets = useMemo(() => data.assets.reduce((s, a) => s + num(a.value), 0), [data.assets]);
  const totalAssets = otherAssets + investCurrent;
  const totalDebt = useMemo(() => data.debts.reduce((s, d) => s + num(d.balance), 0), [data.debts]);
  const netWorth = totalAssets - totalDebt;
  const debtRatio = totalAssets ? (totalDebt / totalAssets) * 100 : 0;

  const allocation = useMemo(() => {
    const m = {};
    data.assets.forEach((a) => { m[a.category] = (m[a.category] || 0) + num(a.value); });
    m["투자자산"] = (m["투자자산"] || 0) + investCurrent;
    return Object.entries(m).filter(([, v]) => v > 0).map(([name, value]) => ({ name, value }));
  }, [data.assets, investCurrent]);

  const invByClass = useMemo(() => {
    const m = {};
    positions.forEach((p) => {
      const rules = CLASS_MAP[p.name] || [["기타", 1]];
      rules.forEach(([cls, w]) => { m[cls] = (m[cls] || 0) + p.mvKRW * w; });
    });
    return Object.entries(m).filter(([, v]) => v > 0)
      .sort((a, b) => CLASS_ORDER.indexOf(a[0]) - CLASS_ORDER.indexOf(b[0]))
      .map(([name, value]) => ({ name, value }));
  }, [positions]);

  const donutDetail = useMemo(() => {
    const out = [];
    allocation.forEach((c) => {
      const items = c.name === "투자자산"
        ? invByClass
        : data.assets.filter((a) => a.category === c.name && num(a.value) > 0).map((a) => ({ name: a.name, value: num(a.value) }));
      const pal = SHADES[c.name] || ["#5E6B66"];
      items.forEach((it, i) => out.push({ ...it, cat: c.name, color: pal[i % pal.length] }));
    });
    return out;
  }, [allocation, invByClass, data.assets]);

  const pathData = useMemo(() =>
    [...data.yearly].sort((a, b) => a.year - b.year).map((y) => ({
      age: y.year - num(data.profile.birthYear), year: y.year,
      실적: y.year === curYear ? netWorth : (y.netWorth == null || y.netWorth === "" ? null : num(y.netWorth)),
      목표: y.target == null || y.target === "" ? null : num(y.target),
    })), [data.yearly, data.profile.birthYear, curYear, netWorth]);

  const retYear = useMemo(() => [...data.yearly].filter((y) => y.returnPct != null && y.returnPct !== "")
    .sort((a, b) => a.year - b.year).map((y) => ({ label: String(y.year), full: y.year + "년", r: num(y.returnPct), amt: num(y.returnAmt) })), [data.yearly]);
  const retQuarter = useMemo(() => [...data.quarterly].filter((q) => q.returnPct != null && q.returnPct !== "")
    .sort((a, b) => a.year - b.year || a.q - b.q).map((q) => ({ label: String(q.year).slice(2) + " Q" + q.q, full: q.year + "년 " + q.q + "분기", r: num(q.returnPct), amt: num(q.returnAmt) })), [data.quarterly]);
  const retSeries = retView === "year" ? retYear : retQuarter;
  const retTotal = retSeries.reduce((s, x) => s + x.amt, 0);

  const invTrend = useMemo(() => [...data.invSeries].sort((a, b) => a.year - b.year || a.q - b.q)
    .map((r) => ({ label: String(r.year).slice(2) + " Q" + r.q, full: r.year + "년 " + r.q + "분기", "원금": num(r.principal), "평가액": num(r.value) })), [data.invSeries]);

  const retireYear = num(data.profile.birthYear) + num(data.profile.retireAge);
  const goal = [...data.yearly].sort((a, b) => b.year - a.year).find((y) => num(y.target) > 0);
  const stockNames = useMemo(() => [...new Set(data.transactions.map((t) => t.name).filter(Boolean))], [data.transactions]);
  const curOf = (nm) => { const t = data.transactions.find((x) => x.name === nm); return t ? t.currency : "KRW"; };

  /* ---- mutators ---- */
  const upd = (key, id, field, val) => set({ [key]: data[key].map((r) => (r.id === id ? { ...r, [field]: val } : r)) });
  const del = (key, id) => set({ [key]: data[key].filter((r) => r.id !== id) });
  const addAsset = () => set({ assets: [...data.assets, { id: uid(), name: "새 자산", category: "현금성", value: 0 }] });
  const addDebt = () => set({ debts: [...data.debts, { id: uid(), name: "새 부채", category: "신용", balance: 0, rate: 0, monthly: 0, maturity: "" }] });
  const addYear = () => set({ yearly: [...data.yearly, { id: uid(), year: new Date().getFullYear(), netWorth: 0, target: 0, returnPct: 0, returnAmt: 0 }] });
  const addQuarter = () => set({ quarterly: [...data.quarterly, { id: uid(), year: new Date().getFullYear(), q: 1, returnPct: 0, returnAmt: 0 }] });
  const addInvSeries = () => set({ invSeries: [...data.invSeries, { id: uid(), year: new Date().getFullYear(), q: 1, principal: 0, value: 0 }] });
  const saveSnapshot = () => {
    const D = today();
    const value = Math.round(investCurrent);
    const sorted = [...data.snapshots].sort((a, b) => (a.date < b.date ? 1 : -1));
    const prev = sorted.find((s) => s.date < D) || sorted[0] || null;
    const startValue = prev ? prev.value : value;
    const startDate = prev ? prev.date : "0000-00-00";
    let netFlow = 0; // 기간 중 순입금 = 매수 − 매도 (기초잔고 제외)
    data.transactions.forEach((t) => {
      if (t.opening) return;
      if (t.date > startDate && t.date <= D) {
        const conv = t.currency === "USD" ? fx : 1;
        if (t.type === "buy") netFlow += (num(t.shares) * num(t.price) + num(t.fee)) * conv;
        else if (t.type === "sell") netFlow -= (num(t.shares) * num(t.price) - num(t.fee)) * conv;
      }
    });
    const gain = value - startValue - netFlow;
    const rp = startValue ? Math.round((gain / startValue) * 1000) / 10 : 0;
    const Y = Number(D.slice(0, 4));
    const Q = Math.floor((Number(D.slice(5, 7)) - 1) / 3) + 1;
    const quarterly = [...data.quarterly];
    const qi = quarterly.findIndex((x) => Number(x.year) === Y && Number(x.q) === Q);
    if (qi >= 0) quarterly[qi] = { ...quarterly[qi], returnPct: rp, returnAmt: Math.round(gain) };
    else quarterly.push({ id: uid(), year: Y, q: Q, returnPct: rp, returnAmt: Math.round(gain) });
    const yq = quarterly.filter((x) => Number(x.year) === Y);
    const yGain = yq.reduce((s, x) => s + num(x.returnAmt), 0);
    const yPct = Math.round(yq.reduce((s, x) => s + num(x.returnPct), 0) * 10) / 10;
    const yearly = [...data.yearly];
    const yi = yearly.findIndex((x) => Number(x.year) === Y);
    const nw = Math.round(netWorth);
    if (yi >= 0) yearly[yi] = { ...yearly[yi], netWorth: nw, returnPct: yPct, returnAmt: Math.round(yGain) };
    else yearly.push({ id: uid(), year: Y, netWorth: nw, target: null, returnPct: yPct, returnAmt: Math.round(yGain) });
    const snapshots = [...data.snapshots.filter((s) => s.date !== D), { id: uid(), date: D, value, netWorth: nw }];
    const invSeries = [...data.invSeries];
    const ii = invSeries.findIndex((x) => Number(x.year) === Y && Number(x.q) === Q);
    const principalNow = Math.round(costBasis);
    if (ii >= 0) invSeries[ii] = { ...invSeries[ii], principal: principalNow, value: value };
    else invSeries.push({ id: uid(), year: Y, q: Q, principal: principalNow, value: value });
    setData((d) => ({ ...d, quarterly, yearly, snapshots, invSeries }));
    setSnapMsg(`${Y}년 ${Q}분기 기록 — 손익 ${signWon(gain)} (${pct(rp)}) · 순자산 ${won(nw)} 저장됨`);
  };
  const delSnapshot = (id) => set({ snapshots: data.snapshots.filter((s) => s.id !== id) });
  const addAccount = () => set({ accounts: [...data.accounts, { id: uid(), name: "새 계좌", broker: "" }] });
  const addTxn = () => set({ transactions: [...data.transactions, { id: uid(), date: today(), accountId: data.accounts[0]?.id || "", name: "", type: "buy", shares: 0, price: 0, fee: 0, currency: "KRW", opening: false }] });
  const setPrice = (nm, val) => set({ prices: { ...data.prices, [nm]: val } });
  const refreshPrices = async () => {
    setRefreshing(true); setRefreshMsg("시세 불러오는 중…");
    try {
      const server = (data.profile.priceServer || "").trim().replace(/\/+$/, "");
      if (server) {
        const res = await fetch(`${server}/quotes`);
        if (!res.ok) throw new Error("server " + res.status);
        const j = await res.json();
        const updates = {};
        Object.entries(j.quotes || {}).forEach(([nm, px]) => { if (stockNames.includes(nm) && px > 0) updates[nm] = Math.round(px); });
        if (Object.keys(updates).length) {
          setData((d) => ({ ...d, profile: { ...d.profile, fx: j.fx ? Math.round(j.fx) : d.profile.fx }, prices: { ...d.prices, ...updates } }));
          setRefreshMsg(`갱신 완료 (내 서버): ${Object.keys(updates).join(", ")}${j.fx ? ` · 환율 ${Math.round(j.fx).toLocaleString()}원` : ""} (${new Date().toLocaleTimeString("ko-KR")})`);
        } else {
          setRefreshMsg("서버는 응답했지만 해당 종목 시세가 없습니다 — server.js 의 종목 매핑을 확인하세요.");
        }
      } else {
        let fxRate = num(data.profile.fx) || 1;
        const fxQ = await fetchStooq("usdkrw"); if (fxQ) fxRate = fxQ;
        const updates = {}; const done = [];
        for (const [name, sym] of Object.entries(TICKER_MAP)) {
          if (!stockNames.includes(name)) continue;
          const q = await fetchStooq(sym);
          if (q) { updates[name] = Math.round(curOf(name) === "USD" ? q : q * fxRate); done.push(name); }
        }
        if (done.length) {
          setData((d) => ({ ...d, profile: { ...d.profile, fx: Math.round(fxRate) }, prices: { ...d.prices, ...updates } }));
          setRefreshMsg(`갱신 완료 (공개데이터): ${done.join(", ")} · 환율 ${Math.round(fxRate).toLocaleString()}원 (${new Date().toLocaleTimeString("ko-KR")})`);
        } else {
          setRefreshMsg("시세를 가져오지 못했습니다 — 수동 입력을 이용하세요.");
        }
      }
    } catch (e) {
      setRefreshMsg("시세 연결 실패 — 서버 주소/네트워크를 확인하거나 수동 입력하세요.");
    }
    setRefreshing(false);
  };
  const cloudBackupNow = async () => {
    const server = (data.profile.priceServer || "").trim().replace(/\/+$/, "");
    const key = (data.profile.backupKey || "").trim();
    if (!server || !key) { setBackupMsg("시세 서버 URL과 백업 키를 먼저 입력하세요."); return; }
    setBackupMsg("백업 중…");
    try {
      const res = await fetch(`${server}/backup?key=${encodeURIComponent(key)}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
      const j = await res.json().catch(() => ({}));
      setBackupMsg(res.ok ? "백업 완료 " + new Date().toLocaleTimeString("ko-KR") : "백업 실패: " + (j.error || res.status));
    } catch (e) { setBackupMsg("백업 실패 — 네트워크"); }
  };
  const cloudRestore = async () => {
    const server = (data.profile.priceServer || "").trim().replace(/\/+$/, "");
    const key = (data.profile.backupKey || "").trim();
    if (!server || !key) { setBackupMsg("시세 서버 URL과 백업 키를 먼저 입력하세요."); return; }
    if (!confirm("클라우드 백업으로 현재 데이터를 덮어쓸까요? 이 기기의 현재 내용은 사라집니다.")) return;
    setBackupMsg("복원 중…");
    try {
      const res = await fetch(`${server}/backup?key=${encodeURIComponent(key)}`);
      const j = await res.json().catch(() => ({}));
      if (!res.ok) { setBackupMsg("복원 실패: " + (j.error || res.status)); return; }
      if (j && j.data) { setData(normalize(j.data)); setBackupMsg("복원 완료 " + new Date().toLocaleTimeString("ko-KR")); }
      else setBackupMsg("클라우드에 저장된 백업이 없습니다.");
    } catch (e) { setBackupMsg("복원 실패 — 네트워크"); }
  };

  if (!loaded) return <div style={{ padding: 40, color: T.dim, background: T.bg, fontFamily: "system-ui" }}>불러오는 중…</div>;

  return (
    <div className="lr-root">
      <style>{CSS}</style>

      <header className="lr-header">
        <div>
          <div className="lr-brand">LIFE&nbsp;ROAD</div>
          <div className="lr-brand-sub">{data.profile.name || "나"}의 인생 자산관리 · 만 {age}세</div>
        </div>
        <div className="lr-headline">
          <div className="lr-headline-label">순자산</div>
          <div className="lr-headline-val">{won(netWorth)}</div>
        </div>
      </header>

      <nav className="lr-tabs">
        {[["dashboard", "대시보드"], ["assets", "자산"], ["invest", "투자·거래내역"], ["debt", "부채"], ["history", "수익 기록"], ["settings", "설정"]]
          .map(([k, label]) => <button key={k} className={"lr-tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}>{label}</button>)}
      </nav>

      {/* ============================ DASHBOARD ============================ */}
      {tab === "dashboard" && (
        <div className="lr-grid">
          <div className="lr-kpis">
            <Kpi label="총자산" value={won(totalAssets)} color={T.text} />
            <Kpi label="총부채" value={won(totalDebt)} color={T.loss} sub={`부채비율 ${debtRatio.toFixed(0)}%`} />
            <Kpi label="투자 평가액" value={won(investCurrent)} color={T.mint} sub={`누적손익 ${signWon(cumPL)}`} subColor={cumPL >= 0 ? T.mint : T.loss} />
            <Kpi label="순자산" value={won(netWorth)} color={T.cream} />
          </div>

          <Card title="나이별 자산 경로" sub="연도별 순자산 추이 · 올해는 현재 자산현황에서 자동 반영" accent={T.cream}>
            <ResponsiveContainer width="100%" height={300}>
              <AreaChart data={pathData} margin={{ top: 8, right: 12, left: 4, bottom: 0 }}>
                <defs>
                  <linearGradient id="gAct" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.mint} stopOpacity={0.32} /><stop offset="100%" stopColor={T.mint} stopOpacity={0.03} /></linearGradient>
                </defs>
                <CartesianGrid stroke={T.line} vertical={false} />
                <XAxis dataKey="age" tickFormatter={(a) => a + "세"} stroke={T.dim} fontSize={12} tickLine={false} />
                <YAxis tickFormatter={eokTick} stroke={T.dim} fontSize={12} tickLine={false} width={46} />
                <Tooltip formatter={(v, n) => [won(v), n]} labelFormatter={(a) => `만 ${a}세`} contentStyle={tip} />
                <ReferenceLine x={age} stroke={T.dim} strokeDasharray="3 3" label={{ value: "현재", fontSize: 11, fill: T.dim, position: "top" }} />
                <Area type="monotone" dataKey="실적" stroke={T.mint} strokeWidth={2.5} fill="url(#gAct)" connectNulls dot={{ r: 3, fill: T.mint }} />
              </AreaChart>
            </ResponsiveContainer>
          </Card>

          <div className="lr-row2">
            <Card title="현재 자산현황" sub="자산 배분 · 투자자산은 자산군별 세분화" accent={T.cream}>
              <div className="lr-alloc">
                <ResponsiveContainer width="48%" height={240}>
                  <PieChart>
                    <Pie data={allocation} dataKey="value" nameKey="name" innerRadius={38} outerRadius={56} paddingAngle={1} stroke="none">
                      {allocation.map((a) => <Cell key={a.name} fill={CAT_COLORS[a.name] || "#5E6B66"} />)}
                    </Pie>
                    <Pie data={donutDetail} dataKey="value" nameKey="name" innerRadius={60} outerRadius={92} paddingAngle={1} stroke="none">
                      {donutDetail.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip formatter={(v, n) => [won(v), n]} contentStyle={tip} />
                  </PieChart>
                </ResponsiveContainer>
                <ul className="lr-legend">
                  {allocation.map((a, ai) => (
                    <React.Fragment key={a.name}>
                      <li><span className="dot" style={{ background: CAT_COLORS[a.name] || "#5E6B66" }} />
                        <span className="nm">{a.name}</span><span className="vl">{won(a.value)}</span>
                        <span className="pc">{totalAssets ? ((a.value / totalAssets) * 100).toFixed(0) : 0}%</span></li>
                      {a.name === "투자자산" && invByClass.map((acc, i) => (
                        <li key={acc.name} className="leaf"><span className="dot" style={{ background: SHADES["투자자산"][i % SHADES["투자자산"].length] }} />
                          <span className="nm">{acc.name}</span><span className="vl">{won(acc.value)}</span>
                          <span className="pc">{totalAssets ? ((acc.value / totalAssets) * 100).toFixed(0) : 0}%</span></li>
                      ))}
                    </React.Fragment>
                  ))}
                </ul>
              </div>
            </Card>

            <Card title="투자 수익률" sub="기록 기반 · 수익률 + 손익금액" accent={T.mint}
              right={<div className="lr-seg"><button className={retView === "year" ? "on" : ""} onClick={() => setRetView("year")}>연도</button><button className={retView === "quarter" ? "on" : ""} onClick={() => setRetView("quarter")}>분기</button></div>}>
              <div className="lr-ret-total"><span>{retView === "year" ? "연도" : "분기"} 누적 손익</span><b style={{ color: retTotal >= 0 ? T.mint : T.loss }}>{signWon(retTotal)}</b></div>
              <ResponsiveContainer width="100%" height={172}>
                <BarChart data={retSeries} margin={{ top: 16, right: 8, left: 0, bottom: 0 }}>
                  <CartesianGrid stroke={T.line} vertical={false} />
                  <XAxis dataKey="label" stroke={T.dim} fontSize={11} tickLine={false} interval={retSeries.length > 12 ? Math.ceil(retSeries.length / 9) : 0} />
                  <YAxis tickFormatter={(v) => v + "%"} stroke={T.dim} fontSize={11} tickLine={false} width={34} />
                  <Tooltip content={<RetTip />} cursor={{ fill: "rgba(124,224,211,.06)" }} />
                  <ReferenceLine y={0} stroke={T.dim} />
                  <Bar dataKey="r" radius={[3, 3, 0, 0]} maxBarSize={46}>
                    {retSeries.map((d, i) => <Cell key={i} fill={d.r >= 0 ? T.mint : T.loss} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          </div>

          {/* ledger-derived performance summary */}
          <Card title="투자 성과 요약" sub="거래내역에서 자동 계산 (이동평균법)" accent={T.mint}>
            <div className="lr-stats">
              <Stat label="평가액" value={won(investCurrent)} color={T.text} />
              <Stat label="평가손익 (미실현)" value={signWon(unrealTotal)} color={unrealTotal >= 0 ? T.mint : T.loss} />

                    <td className="r"><NumInput value={r.value} onChange={(v) => upd("invSeries", r.id, "value", v)} hint /></td>
                    <td className="r mono" style={{ color: num(r.value) - num(r.principal) >= 0 ? T.mint : T.loss }}>{signWon(num(r.value) - num(r.principal))}</td>
                    <td className="r"><button className="lr-x" onClick={() => del("invSeries", r.id)}>×</button></td></tr>
                ))}</tbody>
              </table>
            </div>
            <div className="lr-mini">2022~2026 상반기는 연금·투자 포트폴리오 기록입니다. 2026 하반기부터는 스냅샷 저장 시 토스 계좌를 포함한 전체 투자로 갱신되어, 그 시점에 한 번 계단이 생길 수 있습니다.</div>
            <button className="lr-add" onClick={addInvSeries}>+ 분기 추가</button>
          </Card>
        </div>
      )}

      {/* ============================== SETTINGS =========================== */}
      {tab === "settings" && (
        <div className="lr-grid">
          <Card title="기본 정보">
            <div className="lr-form">
              <label>이름<TextInput value={data.profile.name} onChange={(v) => set({ profile: { ...data.profile, name: v } })} width={180} /></label>
              <label>출생연도<NumInput value={data.profile.birthYear} onChange={(v) => set({ profile: { ...data.profile, birthYear: v } })} width={100} /></label>
              <label>목표 은퇴 나이<NumInput value={data.profile.retireAge} onChange={(v) => set({ profile: { ...data.profile, retireAge: v } })} width={80} /></label>
              <label>환율 USD/KRW<NumInput value={data.profile.fx} onChange={(v) => set({ profile: { ...data.profile, fx: v } })} width={100} /></label>
              <label>기초 실현손익 (~2026.6.30, 원)<NumInput value={data.profile.openingRealized} onChange={(v) => set({ profile: { ...data.profile, openingRealized: v } })} width={160} hint /></label>
              <label style={{ gridColumn: "1 / -1" }}>시세 서버 URL (자동 시세)<TextInput value={data.profile.priceServer} onChange={(v) => set({ profile: { ...data.profile, priceServer: v } })} width={340} /></label>
            </div>
            <div className="lr-backup">
              <div className="lr-backup-title">웹 자동 백업 (내 시세 서버 → 비공개 GitHub)</div>
              <div className="lr-backup-desc">백업 키를 입력하면 데이터가 바뀔 때마다 자동으로 서버에 백업됩니다. 서버 환경변수에 설정한 <b>BACKUP_KEY</b> 와 같은 값을 넣으세요. (서버 설정법은 price-server의 README 참고)</div>
              <label style={{ display: "block", marginTop: 10, fontSize: 13, color: "var(--dim)", fontWeight: 600 }}>백업 키<br /><TextInput value={data.profile.backupKey} onChange={(v) => set({ profile: { ...data.profile, backupKey: v } })} width={280} /></label>
              <div className="lr-backup-btns">
                <button className="lr-btn" onClick={cloudBackupNow}>지금 백업</button>
                <button className="lr-btn" onClick={cloudRestore}>클라우드에서 복원</button>
              </div>
              {backupMsg && <div className="lr-mini" style={{ marginTop: 8 }}>{backupMsg}</div>}
            </div>
            <div className="lr-note">입력 데이터는 이 기기에 자동 저장됩니다. 기기를 바꾸실 때는 위 백업 기능을 이용하세요.
              <button className="lr-reset" onClick={() => { if (confirm("모든 데이터를 예시값으로 초기화할까요?")) setData(normalize(SEED)); }}>예시값으로 초기화</button></div>
          </Card>
        </div>
      )}

      <footer className="lr-foot">LIFE ROAD · 개인 자산관리 프로토타입 v3 (거래내역 기반) · 데이터는 외부로 전송되지 않습니다</footer>
    </div>
  );
}

function RetTip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const d = payload[0].payload;
  return (
    <div style={{ background: T.bg2, border: `1px solid ${T.line}`, borderRadius: 8, padding: "8px 11px", fontSize: 12, color: T.text }}>
      <div style={{ color: T.dim, marginBottom: 3 }}>{d.full}</div>
      <div>수익률 <b style={{ color: d.r >= 0 ? T.mint : T.loss }}>{pct(d.r)}</b></div>
      <div>손익 <b style={{ color: d.amt >= 0 ? T.mint : T.loss }}>{signWon(d.amt)}</b></div>
    </div>
  );
}

const APP_PW = "attorney0703";
function mountApp(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.style.cssText = 'min-height:100vh;';
  ReactDOM.createRoot(root).render(React.createElement(LifeRoad));
}
function showGate(){
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.style.cssText = 'min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B0C0E;color:#F2EEE6;font-family:system-ui,sans-serif;';
  const box = document.createElement('div');
  box.style.cssText = 'width:300px;text-align:center;';
  box.innerHTML = '<div style="font-weight:800;letter-spacing:.24em;font-size:20px;color:#FBF1E6;margin-bottom:6px;">LIFE&nbsp;ROAD</div><div style="font-size:13px;color:#938E82;margin-bottom:20px;">비밀번호를 입력하세요</div>';
  const inp = document.createElement('input');
  inp.type = 'password'; inp.placeholder = '비밀번호';
  inp.style.cssText = 'width:100%;box-sizing:border-box;padding:11px 12px;border:1px solid #272B31;border-radius:9px;background:#141619;color:#F2EEE6;font-size:15px;text-align:center;outline:none;';
  const err = document.createElement('div');
  err.style.cssText = 'color:#E8806B;font-size:12px;height:16px;margin-top:8px;';
  const btn = document.createElement('button');
  btn.textContent = '열기';
  btn.style.cssText = 'width:100%;margin-top:12px;padding:11px;border:none;border-radius:9px;background:#7CE0D3;color:#0B0C0E;font-weight:700;font-size:15px;cursor:pointer;';
  function tryOpen(){
    if (inp.value === APP_PW){ try{ localStorage.setItem('liferoad_unlocked','1'); }catch(e){} mountApp(); }
    else { err.textContent = '비밀번호가 올바르지 않습니다.'; inp.value=''; inp.focus(); }
  }
  btn.onclick = tryOpen;
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') tryOpen(); });
  box.appendChild(inp); box.appendChild(err); box.appendChild(btn);
  root.appendChild(box); inp.focus();
}
try { if (localStorage.getItem('liferoad_unlocked') === '1') mountApp(); else showGate(); }
catch(e){ showGate(); }
</script>
